name: Auto Deploy to Railway on Push

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'Dockerfile'
      - '.env.example'

jobs:
  trigger-railway:
    runs-on: ubuntu-latest
    name: Trigger Railway Deployment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate code changes exist
        run: |
          echo "✓ Validating code was actually pushed..."
          git log --oneline -1

      - name: Trigger Railway deployment via CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Install Railway CLI
          curl -fsSL https://railway.app/install.sh | bash

          # Trigger deployment
          railway up --service puebloladehesa-web

      - name: Wait for deployment
        run: |
          echo "⏳ Railway is building..."
          sleep 5

      - name: Validate deployment
        run: |
          # Verificar que los cambios están en QA después del deploy
          echo "✓ Checking if changes are live in QA..."

          # Simple check: ver si la URL responde
          curl -s https://puebloladehesa-web-production.up.railway.app | head -20

